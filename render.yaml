        value: https://naaoarltrxjaikbqmjyd.supabase.co
      - key: SUPABASE_KEY
        value: sb_publishable_R8QiIXZ86UpKi2GVuFc7Sg_TBQRYGbq

  - type: redis
    name: cache-redis
    plan: free
    ipAllowList: []